<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watch Party - Mạng Ngang Hàng (P2P)</title>
    <link rel="stylesheet" href="style.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/webtorrent@latest/webtorrent.min.js"></script>
</head>
<body>
    <div class="container">
        <h1>🎬 Xem Phim Cùng Nhau (P2P)</h1>

        <div id="setup-section">
            <div class="box">
                <h3>Tạo phòng mới (Bạn là Chủ phòng)</h3>
                <button id="btn-create-room">Tạo Phòng</button>
            </div>
            <div class="box">
                <h3>Tham gia phòng</h3>
                <input type="text" id="input-room-id" placeholder="Nhập ID phòng...">
                <button id="btn-join-room">Vào Phòng</button>
            </div>
        </div>

        <div id="room-section" class="hidden">
            <div class="room-info">
                <span>Mã phòng: <strong id="display-room-id"></strong></span>
                <span id="role-badge"></span>
            </div>

            <div id="host-panel" class="hidden box">
                <div style="margin-bottom: 15px;">
                    <label><strong>Cách 1: Dán link video (.mp4)</strong></label><br>
                    <input type="text" id="input-video-url" placeholder="VD: link .mp4, .webm...">
                    <button id="btn-load-video">Phát Link</button>
                </div>
                
                <hr style="border-color: #333; margin: 15px 0;">

                <div>
                    <label><strong>Cách 2: Phát trực tiếp file từ máy (P2P)</strong></label><br>
                    <input type="file" id="input-video-file" accept="video/mp4, video/webm" style="margin-top: 10px;">
                    <button id="btn-upload-video">Phát Ngay</button>
                </div>
                
                <div id="upload-status" class="hidden" style="margin-top: 10px; color: #00ff88; font-weight: bold;">
                    <span id="upload-text">Đang tạo kết nối P2P... Vui lòng không đóng tab này!</span>
                </div>
            </div>

            <div id="viewer-controls" class="hidden box" style="display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 15px;">
                <div style="flex-grow: 1;">
                    <label for="volume-slider">🔊 <strong>Âm lượng cá nhân:</strong> <span id="vol-percent">100%</span></label>
                    <input type="range" id="volume-slider" min="0" max="1" step="0.05" value="1" style="width: 100%; margin-top: 10px;">
                </div>
                <button id="btn-fullscreen" style="padding: 10px 20px; background-color: #007bff; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; color: white;">🔲 Toàn Màn Hình</button>
            </div>

            <div id="video-wrapper" class="video-container" style="position: relative; background: #000;">
                <video id="my-video" width="100%">
                    Trình duyệt của bạn không hỗ trợ thẻ video.
                </video>
                <div id="viewer-overlay" class="hidden" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10;"></div>
            </div>
            
            <div id="download-status" class="hidden box" style="color: #00ff88;">
                Đang nhận dữ liệu trực tiếp từ Chủ phòng... (<span id="download-speed">0</span> KB/s)
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
